<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="专业、安全、高速的软件下载站空壳模板 - 包含完整结构，易于填充内容">
    <meta name="keywords" content="下载站,软件下载,免费软件,绿色软件,模板">
    <meta name="author" content="YourSiteName">
    <title>极速下载站 | 安全可靠的软件分享平台</title>
    
    <!-- 引入Google Fonts提升字体质感 (可选，不影响功能) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 (免费图标库，用于下载、箭头等图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ---------- 全局重置 & 变量 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* 容器公用宽度，响应式处理 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 头部导航样式 */
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(2px);
            background-color: rgba(255, 255, 255, 0.96);
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area a {
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .logo-area span {
            font-size: 0.9rem;
            font-weight: 500;
            background: none;
            color: #475569;
            display: inline-block;
            margin-left: 8px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #3b82f6;
        }

        /* 搜索框 (简单样式，便于后续扩展) */
        .search-wrap {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 6px 12px;
        }

        .search-wrap i {
            color: #94a3b8;
        }

        .search-wrap input {
            border: none;
            background: transparent;
            padding: 8px 8px 8px 10px;
            font-size: 0.9rem;
            width: 180px;
            outline: none;
        }

        /* 主体区块 */
        .hero {
            background: linear-gradient(145deg, #eff6ff 0%, #ffffff 100%);
            padding: 48px 0 40px;
            border-bottom: 1px solid #e0e7ff;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(120deg, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.1rem;
            color: #334155;
            max-width: 700px;
        }

        /* 面包屑 (可选，增强导航) */
        .breadcrumb {
            margin: 20px 0 10px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .breadcrumb a {
            color: #3b82f6;
            text-decoration: none;
        }

        /* 下载列表卡片区域 */
        .download-section {
            padding: 48px 0 64px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 32px;
            border-left: 5px solid #3b82f6;
            padding-left: 18px;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
        }

        /* 单个卡片 */
        .download-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            border: 1px solid #eef2ff;
        }

        .download-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
        }

        .card-content {
            padding: 20px 24px 24px;
        }

        .software-icon {
            width: 52px;
            height: 52px;
            background: #eef2ff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            font-size: 28px;
            color: #3b82f6;
        }

        .software-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        .software-desc {
            color: #475569;
            font-size: 0.9rem;
            margin: 12px 0 16px;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta-info {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: #5b6e8c;
            border-top: 1px solid #eef2ff;
            padding-top: 14px;
            margin-top: 8px;
        }

        .meta-info span i {
            margin-right: 4px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            margin-top: 18px;
            border: none;
            cursor: pointer;
            width: auto;
        }

        .download-btn:hover {
            background: #2563eb;
            transform: scale(0.98);
        }

        /* 右侧或底部广告/推荐位 (空壳占位) */
        .extra-placeholder {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            margin-top: 48px;
            border: 1px dashed #cbd5e1;
            color: #64748b;
        }

        /* 页脚 */
        .footer {
            background: #0f172a;
            color: #cbd5e1;
            padding: 40px 0 24px;
            margin-top: 20px;
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 30px;
        }

        .footer-col p {
            margin: 12px 0;
            max-width: 260px;
            font-size: 0.85rem;
        }

        .footer-col h4 {
            color: white;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 8px;
        }

        .footer-links a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #60a5fa;
        }

        .copyright {
            text-align: center;
            border-top: 1px solid #1e293b;
            padding-top: 24px;
            margin-top: 28px;
            font-size: 0.8rem;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            .nav-links {
                flex-wrap: wrap;
                gap: 16px;
            }
            .hero h1 {
                font-size: 1.9rem;
            }
            .container {
                padding: 0 20px;
            }
            .download-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

</body>
</html>
